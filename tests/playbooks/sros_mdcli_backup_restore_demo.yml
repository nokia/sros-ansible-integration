---
- hosts: nokia_srsim
  gather_facts: No

  tasks:
  - name: backup
    ansible.netcommon.cli_backup:
      dir_path: /tmp
    register: backup_info

  - name: backup details
    debug:
      msg: "{{backup_info}}"

  - name: do some config
    ansible.netcommon.cli_config:
      config: |
        configure service
          customer nobody
            customer-id 100
            back
          vpls midnight
            service-id 100
            customer nobody
          exit all

  - name: "restore backup (Success: MDCLI does support restore)"
    ansible.netcommon.cli_config:
      replace: "{{ backup_info.backup_path }}"