---
- hosts: nokia_srsim_classic
  gather_facts: No

  tasks:
    - name: Enable Rollback Support
      ansible.netcommon.cli_command:
        command: "{{item}}"
      loop:
        - file md cf3:/rollbacks
        - configure system rollback rollback-location cf3:/rollbacks/config
        - admin rollback save
...