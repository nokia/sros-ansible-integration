---
- hosts: nokia_srsim_classic
  gather_facts: No

  tasks:
  - name: backup
    ansible.netcommon.cli_config:
      backup: yes
      backup_options:
        dir_path: /tmp
    register: backup_info

  - name: backup details
    debug:
      msg: "{{backup_info}}"

  - name: do some config
    ansible.netcommon.cli_config:
      config: |
        configure service
          customer 100 name nobody create
            back
          vpls 100 name midnight customer 100 create
            exit all

  - block:
    - name: "restore backup"
      ansible.netcommon.cli_config:
        replace: 'true'
        config: "{{ lookup('file', backup_info.backup_path) }}"
    rescue:
      - name: Failure details (error was expected)
        ansible.builtin.debug:
          msg:
            - "Restore not supported on classic CLI"
...