---
name: CICD

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Generate test matrix from test-definitions.yml
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Install PyYAML
        run: pip install pyyaml
      
      - name: Generate Matrix from test-definitions.yml
        id: set-matrix
        run: |
          python3 << 'EOF' >> $GITHUB_OUTPUT
          import yaml
          import json
          
          with open('.github/workflows/test-definitions.yml', 'r') as f:
              config = yaml.safe_load(f)
          
          test_matrix = config['test_matrix']
          
          # Generate ALL combinations (cartesian product)
          matrix = {
              "include": []
          }
          
          for python_ver in test_matrix['python_versions']:
              for sros_ver in test_matrix['sros_versions']:
                  for ansible_ver in test_matrix['ansible_versions']:
                      matrix["include"].append({
                          "python-version": python_ver,
                          "sros-version": sros_ver,
                          "ansible-version": ansible_ver
                      })
          
          print(f"matrix={json.dumps(matrix)}")
          EOF

  sanity:
    needs: generate-matrix
    runs-on: ubuntu-latest
    env:
      SRSIM_LICENSE: ${{ secrets.SRSIM_LICENSE }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssh-dev

      - name: Install Python Requirements
        run: pip install -r requirements.txt

      - name: Install Ansible (specific version)
        run: pip install "ansible==${{ matrix.ansible-version }}.*"

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install ansible.netcommon ansible.utils community.general

      - name: Build and install this collection
        run: |
          ansible-galaxy collection install .

      - name: Install containerlab
        run: bash -c "$(curl -sL https://get.containerlab.dev)"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull nokia_srsim docker image
        run: |
          docker pull ghcr.io/nokia/nokia_srsim:${{ matrix.sros-version }}
#          docker pull ghcr.io/nokia/srlinux:latest

      - name: Create license file
        run: |
          echo $SRSIM_LICENSE > tests/license.txt

      - name: Run Tests
        run: |
          cd tests
          chmod +x run.sh
          ./run.sh deploy
          cat clab-ansible/ansible-inventory.yml
          ./run.sh run --category all --quiet --all
          ./run.sh destroy